<body>
  <h2>JavaScript String Methods and Loops</h2>
  <p>Numbers from 1 to 10:</p>
  <p id="result"></p>

  <script>
    var text = "";
     
    for (var i = 1; i <= 10; i++) {
      text += i + "<br>";
    }

     
    document.getElementById("result").innerHTML = text;

     
    document.write("The random value is " + Math.floor(Math.random() * 100) + "<br>");
    var date = new Date();
    document.write("Today's Day of the Month is " + date.getDate()); 
  </script>
</body>
