<!DOCTYPE html>
<html>
    <head>
        <style>
            div {
                right : 30px;
                border: 3px solid black;
            }
            div.absolute {
                position: absolute;
                left: 50px;
                border:3px  solid blueviolet;
            }
            div.relative {
                position: relative;
                left: 100px;
                border:3px  solid rgb(85, 23, 122);
            }
            div.fixed {
                position: fixed;
                top: 0;
                right: 20px;
                width: 100px;
                border:3px  solid rgb(50, 13, 72);
            }
            div.sticky {
                position: sticky;
                top: 1px;
                left: 20px;
                width: 100px;
                border:3px  solid rgb(45, 13, 64);
            }
        </style>
    </head>
    <body>
        <h2>POSITIONING</h2>
        <div>Div with no position property</div>
        <div class="sticky">Div with sticky position property</div>
        <div class="relative">Div with relative position property</div>
        <div class="absolute">Div with absolute position property</div>
        <div class="fixed">Div with fixed position property   </div>

</html>
